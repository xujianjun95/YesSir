name: 🚀 YesSir Deploy

on:
  push:
    branches:
      - main  # ⚠️ 重要：如果你的主分支叫 master，请改成 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: ⚡️ Deploy to Alibaba Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/yessir-proxy
            git fetch origin
            git reset --hard origin/main
            cd proxy-server           # 👈 进入子目录
            npm install --production  # 👈 安装依赖
            pm2 restart yessir-proxy  # 👈 重启服务